version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: moldmind-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API 端口（Python client 默认连接这个）
      - "6334:6334"   # gRPC 端口（可选，性能更高）
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
      - ./qdrant_snapshots:/qdrant/snapshots:z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - moldmind-network

  # 后续可扩展的服务（目前注释掉，Phase 4 再启用）
  # backend:
  #   build: ./backend
  #   container_name: moldmind-backend
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
